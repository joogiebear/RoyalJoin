name: RoyalJoin
version: ${version}
main: com.mystipixel.royaljoin.RoyalJoinPlugin
api-version: '1.21'
author: Mystipixel
description: Pins configurable items to players' hotbar slots that run a command when clicked.
commands:
  royaljoin:
    description: RoyalJoin admin tools.
    usage: /royaljoin reload
    aliases: [rj]
permissions:
  royaljoin.admin:
    description: Reload the RoyalJoin config.
    default: op
